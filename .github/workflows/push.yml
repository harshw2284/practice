name: Push image

on: 
    workflow_call:
            inputs:
              image-name:
                description: "Name of the Docker image (without registry/username)"
                required: true
                type: string

              image-tag:
                description: "Tag of the image to push"
                required: true
                type: string

            secrets:
              DOCKERHUB_USERNAME:
                required: true
              DOCKERHUB_TOKEN:
                required: true

jobs:
    push:
        runs-on: ubuntu-latest
        steps:
            
            - name: Download image artifact
              uses: actions/download-artifact@v4
              with:
                name: docker-image
                path: /tmp

            - name: Load image into Docker
              run: docker load --input /tmp/image.tar

            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Tag image for Docker Hub
              run: |
                docker tag ${{ inputs.image-name }}:${{ inputs.image-tag }} \
                  ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
                docker tag ${{ inputs.image-name }}:${{ inputs.image-tag }} \
                  ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:latest

            - name: Push image to Docker Hub
              run: |
                docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
                docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:latest
